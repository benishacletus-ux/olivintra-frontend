{% extends "base.html" %}



{% block content %}
<div class="min-h-[70vh] bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center">
        <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-exclamation-triangle text-3xl text-yellow-600"></i>
        </div>
        
        <h2 class="text-2xl font-serif font-bold text-brand-dark">Retry Payment</h2>
        <p class="text-gray-500 mt-2">Your previous payment attempt failed. Please try again.</p>
        
        <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
            <p class="text-sm text-gray-600">Order #: <strong class="text-brand-dark">{{ order.order_number }}</strong></p>
            <p class="text-sm text-gray-600 mt-1">Amount: <strong>₹{{ "%.2f"|format(order.total_amount) }}</strong></p>
        </div>
        
        <div class="flex gap-3 mt-6">
            <a href="/payment/checkout/{{ order.id }}" class="flex-1 bg-[#4d502c] text-white px-4 py-2.5 rounded-lg hover:bg-[#3d4022] transition font-medium">
                <i class="fas fa-credit-card mr-2"></i> Pay Now
            </a>
            <a href="/my-orders" class="flex-1 bg-gray-200 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-300 transition font-medium">
                <i class="fas fa-list mr-2"></i> Orders
            </a>
        </div>
    </div>
</div>
{% endblock %}
