{% extends "admin/base_admin.html" %}

{% block title %}Add Hero Slide - Olivintra Admin{% endblock %}

{% block admin_content %}
<div class="mb-6">
    <h2 class="text-2xl font-serif text-brand-dark">Add Hero Slide</h2>
    <p class="text-gray-500 text-sm">Add a new slide to the homepage hero slider</p>
</div>

<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 max-w-3xl">
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                <input type="text" name="title" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Subtitle</label>
                <input type="text" name="subtitle" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Button Text</label>
                <input type="text" name="button_text" value="Shop Now" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Button Link</label>
                <input type="text" name="button_link" value="/shop" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Order</label>
                <input type="number" name="order" value="0" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                <label class="flex items-center gap-2 cursor-pointer mt-2">
                    <input type="checkbox" name="is_active" checked class="w-4 h-4 text-brand-accent focus:ring-brand-accent rounded">
                    <span class="text-sm">Active</span>
                </label>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Slide Image</label>
                <input type="file" name="image" accept="image/*" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-brand-dark file:text-white hover:file:bg-brand-accent">
                <p class="text-xs text-gray-400 mt-1">Recommended size: 1200x800px</p>
            </div>
        </div>

        <div class="flex gap-3 pt-4 border-t border-gray-200">
            <button type="submit" class="bg-brand-dark text-white px-8 py-2.5 rounded-lg hover:bg-brand-accent transition font-medium">
                <i class="fas fa-save mr-2"></i> Save Slide
            </button>
            <a href="/admin/hero" class="bg-gray-200 text-gray-700 px-8 py-2.5 rounded-lg hover:bg-gray-300 transition font-medium">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
