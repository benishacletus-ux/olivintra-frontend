



<div class="mb-6">
    <h2 class="text-2xl font-serif text-brand-dark">User Activity</h2>
    <p class="text-gray-500 text-sm">Track user logins, registrations, and activity</p>
</div>

<!-- Stats Cards -->
<div class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
        <p class="text-gray-500 text-xs uppercase tracking-wider">Total Users</p>
        <p class="text-2xl font-bold text-brand-dark"></p>
    </div>
    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
        <p class="text-gray-500 text-xs uppercase tracking-wider">Today's Registrations</p>
        <p class="text-2xl font-bold text-green-600"></p>
    </div>
    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
        <p class="text-gray-500 text-xs uppercase tracking-wider">Today's Logins</p>
        <p class="text-2xl font-bold text-blue-600"></p>
    </div>
    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
        <p class="text-gray-500 text-xs uppercase tracking-wider">Total Activities</p>
        <p class="text-2xl font-bold text-brand-dark"></p>
    </div>
</div>

<!-- Activity Table -->
<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Activity</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP Address</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Device</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-brand-dark"></div>
                        <div class="text-xs text-gray-500"></div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="status-badge px-2 py-1 rounded text-xs 
                            bg-green-100 text-green-800
                            {% elif activity.activity_type == 'login' %}bg-blue-100 text-blue-800
                            {% elif activity.activity_type == 'logout' %}bg-gray-100 text-gray-800
                            bg-gray-100 text-gray-800">
                            <i class="fas 
                                fa-user-plus
                                {% elif activity.activity_type == 'login' %}fa-sign-in-alt
                                {% elif activity.activity_type == 'logout' %}fa-sign-out-alt
                                fa-circle mr-1">
                            </i>
                            
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">
                        
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">
                        
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-xs text-gray-500 max-w-xs truncate" title="">
                            ...
                        </div>
                    </td>
                </tr>
                
                <tr>
                    <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                        <i class="fas fa-user-clock text-4xl text-gray-300 mb-4 block"></i>
                        <p class="text-lg font-medium">No user activity yet</p>
                        <p class="text-sm mt-1">Activity will appear here when users register or login</p>
                    </td>
                </tr>
                
            </tbody>
        </table>
    </div>
</div>
