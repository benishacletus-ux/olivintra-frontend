

Categories - Olivintra Admin


<div class="mb-8">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-serif text-brand-dark">Categories</h2>
            <p class="text-gray-500 text-sm mt-1">Manage product categories</p>
        </div>
        <a href="" class="bg-[#4d502c] text-white px-4 py-2 rounded hover:bg-[#3d4022] transition">
            <i class="fas fa-plus mr-2"></i> Add Category
        </a>
    </div>
</div>

<!-- Categories Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition group">
        <!-- Category Image -->
        <div class="relative h-48 bg-gray-100">
            
            <img src="" 
                 alt="" 
                 class="w-full h-full object-cover">
            
            <div class="w-full h-full flex items-center justify-center text-gray-400">
                <i class="fas fa-image text-4xl"></i>
            </div>
            
            <div class="absolute top-2 right-2 flex gap-1">
                <span class="bg-black/50 text-white text-xs px-2 py-1 rounded">
                     products
                </span>
            </div>
            
            <div class="absolute bottom-2 left-2">
                <span class="bg-yellow-500 text-white text-xs px-2 py-1 rounded">No Image</span>
            </div>
            
        </div>
        
        <!-- Category Info -->
        <div class="p-4">
            <h3 class="font-semibold text-brand-dark text-lg"></h3>
            
            <p class="text-gray-500 text-sm mt-1 line-clamp-2"></p>
            
            <p class="text-xs text-gray-400 mt-2">Slug: </p>
            <p class="text-xs text-gray-400">Created: </p>
            
            <!-- Actions -->
            <div class="mt-4 flex gap-2">
                <a href="?category=" 
                   target="_blank"
                   class="text-sm text-brand-accent hover:underline">
                    <i class="fas fa-eye mr-1"></i> View
                </a>
                <a href="" 
                   class="text-sm text-blue-600 hover:text-blue-800">
                    <i class="fas fa-edit mr-1"></i> Edit
                </a>
                <button onclick="deleteCategory()" 
                        class="text-sm text-red-600 hover:text-red-800 ml-auto">
                    <i class="fas fa-trash mr-1"></i> Delete
                </button>
            </div>
        </div>
    </div>
    
</div>

<!-- No Categories -->

<div class="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-200">
    <i class="fas fa-tags text-6xl text-gray-300 mb-4 block"></i>
    <p class="text-gray-500 text-lg">No categories yet</p>
    <p class="text-gray-400 text-sm mt-2">Add your first category to organize products</p>
    <a href="" class="inline-block mt-4 bg-[#4d502c] text-white px-6 py-2 rounded hover:bg-[#3d4022] transition">
        <i class="fas fa-plus mr-2"></i> Add Category
    </a>
</div>


<script>
function deleteCategory(id) {
    if (confirm('Are you sure you want to delete this category? This will not delete the products.')) {
        window.location.href = '/admin/category/delete/' + id;
    }
}
</script>
