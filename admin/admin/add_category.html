{% extends "admin/base_admin.html" %}


{% block admin_content %}
<div class="mb-8">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-serif text-brand-dark">Add Category</h2>
            <p class="text-gray-500 text-sm mt-1">Create a new product category</p>
        </div>
        <a href="{{ url_for('admin_categories') }}" class="text-brand-accent hover:underline">
            <i class="fas fa-arrow-left mr-1"></i> Back to Categories
        </a>
    </div>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-2xl">
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        <!-- Category Name -->
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Category Name *</label>
            <input type="text" name="name" id="name" required
                   class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-[#4d502c] focus:border-[#4d502c] transition"
                   placeholder="Enter category name">
        </div>
        
        <!-- Slug -->
        <div>
            <label for="slug" class="block text-sm font-medium text-gray-700">Slug</label>
            <input type="text" name="slug" id="slug"
                   class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-[#4d502c] focus:border-[#4d502c] transition"
                   placeholder="auto-generated from name">
            <p class="text-xs text-gray-400 mt-1">Leave blank to auto-generate from name</p>
        </div>
        
        <!-- Description -->
        <div>
            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" id="description" rows="3"
                      class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-[#4d502c] focus:border-[#4d502c] transition"
                      placeholder="Brief description of the category"></textarea>
        </div>
        
        <!-- Category Image -->
        <div>
            <label for="image" class="block text-sm font-medium text-gray-700">Category Image</label>
            <div class="mt-1 flex items-center gap-4">
                <div id="imagePreview" class="w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center text-gray-400 bg-gray-50">
                    <i class="fas fa-image text-3xl"></i>
                </div>
                <div class="flex-1">
                    <input type="file" name="image" id="image" accept="image/*"
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[#4d502c] file:text-white hover:file:bg-[#3d4022] transition">
                    <p class="text-xs text-gray-400 mt-1">Recommended: 800x600px, JPG/PNG</p>
                </div>
            </div>
        </div>
        
        <!-- Submit -->
        <div class="flex gap-3 pt-4 border-t border-gray-200">
            <button type="submit" class="bg-[#4d502c] text-white px-6 py-3 rounded-lg hover:bg-[#3d4022] transition font-medium">
                <i class="fas fa-plus mr-2"></i> Add Category
            </button>
            <a href="{{ url_for('admin_categories') }}" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-300 transition font-medium">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
// Auto-generate slug from name
document.getElementById('name').addEventListener('input', function() {
    var slugField = document.getElementById('slug');
    if (!slugField.value || slugField.dataset.auto === 'true') {
        var slug = this.value.toLowerCase()
            .replace(/[^a-z0-9\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-+|-+$/g, '');
        slugField.value = slug;
        slugField.dataset.auto = 'true';
    }
});

// Image preview
document.getElementById('image').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var preview = document.getElementById('imagePreview');
            preview.innerHTML = '<img src="' + e.target.result + '" class="w-full h-full object-cover rounded-lg">';
            preview.className = 'w-32 h-32 border border-gray-300 rounded-lg overflow-hidden';
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
