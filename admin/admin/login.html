




<style>
    /* Hide header elements from base.html */
    .bg-brand-dark.text-white.text-\[10px\] {
        display: none !important;
    }
    header {
        display: none !important;
    }
    .whatsapp-float {
        display: none !important;
    }
    #chatbotContainer {
        display: none !important;
    }
    nav[aria-label="Breadcrumb"] {
        display: none !important;
    }
    .max-w-7xl.mx-auto.px-4.pt-4 {

    }
    #flashMessages {
        position: fixed !important;
        top: 1.5rem !important;

    /* Elegant Login Page Styles */
    body {
        background: #f5f3ee !important;
        min-height: 100vh !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .login-container {
        width: 100%;
        max-width: 440px;
        padding: 1.5rem;
        margin: 0 auto;
    }
    
    .login-card {
        background: #ffffff;
        border-radius: 20px;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        border: 1px solid rgba(197, 168, 128, 0.15);
    }
    
    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #4d502c, #c5a880, #4d502c);
        background-size: 200% 100%;
        animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    
    .login-card .corner-accent {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        opacity: 0.04;
        pointer-events: none;
    }
    .login-card .corner-accent.top-right {
        top: -60px;
        right: -60px;
        background: #4d502c;
    }
    .login-card .corner-accent.bottom-left {
        bottom: -60px;
        left: -60px;
        background: #4d502c;
    }
    
    .login-logo {
        width: 72px;
        height: 72px;
        background: linear-gradient(135deg, #4d502c, #3d4022);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
        box-shadow: 0 8px 32px rgba(77, 80, 44, 0.25);

    }
    
    .login-logo::after {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        padding: 2px;
        background: linear-gradient(135deg, #c5a880, transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.3;
    }
    
    .login-logo i {
        font-size: 28px;
        color: #ffffff;
    }
    
    .login-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a1a;
        text-align: center;
        letter-spacing: -0.02em;

    }
    
    .login-subtitle {

    .form-group {

    .form-group label {

    .form-group .input-wrapper input::placeholder {

    .form-group .input-wrapper .toggle-password {

    .form-options {

    .form-options .forgot-link {

    }
    
    .form-options .forgot-link:hover {

    .login-btn {
        width: 100%;
        padding: 0.9rem;

    .login-btn:hover {

    .login-btn:active {

    .login-btn:disabled {

    .login-btn .btn-spinner {

    }
    
    .login-btn .btn-spinner.show {

    .keyboard-hint {

    /* Flash Messages */
    .flash-message {
        padding: 0.75rem 1rem;

    /* ==================== LOGOUT MODAL ==================== */
    .logout-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 10000;

        justify-content: center;

        display: flex;

    @keyframes fadeInOverlay {

        to { opacity: 1; }

    .logout-modal {
        background: #ffffff;
        border-radius: 24px;
        max-width: 420px;
        width: 100%;
        padding: 2.5rem 2rem;

            transform: translateY(30px) scale(0.96);

            transform: translateY(0) scale(1);
        }

    .logout-modal .modal-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #fef3f2;

        justify-content: center;

        color: #dc2626;

    .logout-modal .modal-icon .icon-ring {

        border-radius: 50%;

    }
    
    .logout-modal .modal-title {

    .logout-modal .modal-message {

    .logout-modal .modal-message .highlight {

    }
    
    .logout-modal .modal-divider {

    }
    
    .logout-modal .modal-actions {

    .logout-modal .modal-actions .btn-cancel {

    .logout-modal .modal-actions .btn-cancel:hover {

    }
    
    .logout-modal .modal-actions .btn-logout {

        padding: 0.8rem;
        background: #dc2626;
        border: none;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #ffffff;
        cursor: pointer;

        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        text-decoration: none;

    .logout-modal .modal-actions .btn-logout:hover {

    .logout-modal .modal-actions .btn-logout:active {
        transform: translateY(0);

    .logout-modal .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;

        color: #b0a8a0;

    }
    
    .logout-modal .modal-close:hover {

    }
    
    /* Responsive */
    @media (max-width: 480px) {
        .login-container {
            padding: 1rem;
        }
        .login-card {
            padding: 2rem 1.25rem;
        }
        .login-title {
            font-size: 1.5rem;
        }
        .login-logo {
            width: 60px;
            height: 60px;
        }
        .login-logo i {
            font-size: 22px;
        }
        .form-options {
            flex-direction: column;
            gap: 0.75rem;
            align-items: flex-start;
        }
        .form-group .input-wrapper input {
            font-size: 0.9rem;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
        }
        .login-btn {
            padding: 0.8rem;
            font-size: 0.9rem;
        }
        
        .logout-modal {
            padding: 2rem 1.25rem;
            margin: 1rem;
        }
        .logout-modal .modal-title {
            font-size: 1.25rem;
        }
        .logout-modal .modal-actions {
            flex-direction: column;
        }
        .logout-modal .modal-icon {

    @media (max-width: 380px) {
        .login-card {
            padding: 1.5rem 1rem;
        }
        .login-title {

</style>

<div class="login-container">
    <div class="login-card">
        <!-- Decorative corners -->
        <div class="corner-accent top-right"></div>
        <div class="corner-accent bottom-left"></div>
        
        <!-- Logo -->
        <div class="login-logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <!-- Title -->
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Access the Olivintra Admin Panel</p>
        
        <!-- Flash Messages -->
        
            
                <div style="margin-top: 1.5rem;">
                    
                        <div class="flash-message flash-">
                            <i class="fas fa-check-circle{% elif category == 'error' %}exclamation-circleinfo-circle"></i>
                            <span></span>
                        </div>
                    
                </div>
            
        
        
        <!-- Login Form -->
        <form method="POST" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon"><i class="fas fa-user"></i></span>
                    <input type="text" 
                           name="username" 
                           id="username" 
                           required 
                           autofocus
                           autocomplete="username"
                           placeholder="Enter your username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" 
                           name="password" 
                           id="password" 
                           required
                           autocomplete="current-password"
                           placeholder="Enter your password">
                    <button type="button" 
                            class="toggle-password" 
                            id="togglePassword"
                            aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember">Remember me</label>
                </label>
                
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                <span class="btn-spinner" id="btnSpinner">
                    <i class="fas fa-spinner fa-spin"></i> Logging in...
                </span>
            </button>
        </form>
        
        <!-- Keyboard Shortcut -->
        <div class="keyboard-hint">
            <kbd>Esc</kbd> to clear fields
        </div>
        
        
    </div>
</div>

<!-- ==================== LOGOUT CONFIRMATION MODAL ==================== -->
<div class="logout-modal-overlay" id="logoutModal">
    <div class="logout-modal">
        <button class="modal-close" id="modalCloseBtn" aria-label="Close modal">
            <i class="fas fa-times"></i>
        </button>
        
        <div class="modal-icon">
            <span class="icon-ring"></span>
            <i class="fas fa-sign-out-alt"></i>
        </div>
        
        <h2 class="modal-title">Confirm Logout</h2>
        <p class="modal-message">
            Are you sure you want to logout from the <span class="highlight">Olivintra Admin Panel</span>?<br>
            You will need to login again to access the dashboard.
        </p>
        
        <div class="modal-divider"></div>
        
        <div class="modal-actions">
            <button class="btn-cancel" id="modalCancelBtn">
                <i class="fas fa-times" style="margin-right: 0.35rem;"></i> Cancel
            </button>
            <a href="" class="btn-logout" id="modalConfirmBtn">
                <i class="fas fa-sign-out-alt"></i> Yes, Logout
            </a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // ==================== LOGOUT MODAL ====================
    const logoutModal = document.getElementById('logoutModal');
    const logoutLink = document.getElementById('logoutLink');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    
    // Open modal when logout link is clicked
    logoutLink.addEventListener('click', function(e) {
        e.preventDefault();
        logoutModal.classList.add('active');
        document.body.style.overflow = 'hidden';
    });
    
    // Close modal functions
    function closeModal() {
        logoutModal.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    modalCloseBtn.addEventListener('click', closeModal);
    modalCancelBtn.addEventListener('click', closeModal);
    
    // Close on overlay click
    logoutModal.addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });
    
    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && logoutModal.classList.contains('active')) {
            closeModal();
        }
    });
    
    // ==================== PASSWORD TOGGLE ====================
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    toggleBtn.addEventListener('click', function() {
        const icon = this.querySelector('i');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
            this.style.color = '#4d502c';
        } else {
            passwordInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
            this.style.color = '';
        }
    });
    
    // ==================== FLASH MESSAGES ====================
    setTimeout(function() {
        document.querySelectorAll('.flash-message').forEach(function(el) {
            el.style.transition = 'all 0.5s ease';
            el.style.opacity = '0';
            el.style.transform = 'translateY(-12px) scale(0.98)';
            setTimeout(function() {
                if (el.parentNode) el.remove();
            }, 500);
        });
    }, 5000);
    
    document.addEventListener('click', function(e) {
        const flash = e.target.closest('.flash-message');
        if (flash) {
            flash.style.transition = 'all 0.3s ease';
            flash.style.opacity = '0';
            flash.style.transform = 'translateY(-12px) scale(0.98)';
            setTimeout(function() {
                if (flash.parentNode) flash.remove();
            }, 300);
        }
    });
    
    // ==================== LOADING STATE ====================
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('.btn-text');
    const btnSpinner = document.getElementById('btnSpinner');
    
    loginForm.addEventListener('submit', function(e) {
        if (loginBtn.disabled) {
            e.preventDefault();
            return;
        }
        loginBtn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.add('show');
    });
    
    // ==================== ESCAPE TO CLEAR ====================
    const username = document.getElementById('username');
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const active = document.activeElement;
            if (active === username || active === passwordInput) {
                username.value = '';
                passwordInput.value = '';
                username.focus();
                
                [username, passwordInput].forEach(input => {
                    const wrapper = input.closest('.input-wrapper');
                    wrapper.style.borderColor = '#4d502c';
                    wrapper.style.boxShadow = '0 0 0 4px rgba(77, 80, 44, 0.12)';
                    setTimeout(() => {
                        wrapper.style.borderColor = '';
                        wrapper.style.boxShadow = '';
                    }, 400);
                });
            }
        }
    });
    
    // ==================== FORGOT PASSWORD ====================
    document.getElementById('forgotPassword').addEventListener('click', function(e) {
        e.preventDefault();
        
        // Show a beautiful notification instead of alert
        const flashContainer = document.querySelector('.login-card');
        const flashDiv = document.createElement('div');
        flashDiv.className = 'flash-message flash-info';
        flashDiv.style.marginTop = '1rem';
        flashDiv.innerHTML = `
            <i class="fas fa-envelope"></i>
            <span>ðŸ“§ Password reset link sent to <strong>support@olivintra.com</strong></span>
        `;
        flashContainer.insertBefore(flashDiv, flashContainer.querySelector('form'));
        
        setTimeout(() => {
            flashDiv.style.transition = 'all 0.5s ease';
            flashDiv.style.opacity = '0';
            flashDiv.style.transform = 'translateY(-12px) scale(0.98)';
            setTimeout(() => {
                if (flashDiv.parentNode) flashDiv.remove();
            }, 500);
        }, 4000);
    });
    
    // ==================== CAPS LOCK WARNING ====================
    passwordInput.addEventListener('keydown', function(e) {
        const wrapper = this.closest('.input-wrapper');
        if (e.getModifierState('CapsLock')) {
            wrapper.style.borderColor = '#f59e0b';
        } else {
            wrapper.style.borderColor = '';
        }
    });
});
</script>
