{% extends "base.html" %}



{% block content %}
<section class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl sm:text-3xl font-serif text-brand-dark">Edit Profile</h1>
            <p class="text-gray-500 text-sm">Update your account information</p>
        </div>
        <a href="/profile" class="text-brand-accent hover:underline text-sm">Back to Profile</a>
    </div>

    <div class="bg-white p-6 rounded-lg border border-gray-200">
        <form method="POST" action="/profile/edit">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="username" value="{{ user.username }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" name="phone" value="{{ user.phone or '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <textarea name="address" rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">{{ user.address or '' }}</textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                        <input type="text" name="city" value="{{ user.city or '' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
                        <input type="text" name="state" value="{{ user.state or '' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Pincode</label>
                        <input type="text" name="pincode" value="{{ user.pincode or '' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                    </div>
                </div>
                <div class="border-t border-gray-200 pt-4">
                    <h3 class="font-semibold text-brand-dark mb-2">Change Password</h3>
                    <p class="text-sm text-gray-500 mb-3">Leave blank to keep current password</p>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                        <input type="password" name="new_password"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                    </div>
                </div>
                <button type="submit" class="w-full bg-brand-dark text-white py-3 rounded-lg hover:bg-brand-accent transition font-medium">
                    Update Profile
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
