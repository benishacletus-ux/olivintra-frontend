




<section class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-20">
    <div class="bg-white p-8 rounded-lg border border-gray-200 shadow-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-serif text-brand-dark">Create Account</h1>
            <p class="text-gray-500 text-sm mt-1">Join Olivintra for a better shopping experience</p>
            
            <div class="mt-2 p-2 bg-brand-accent/10 rounded-lg">
                <p class="text-brand-accent text-xs font-medium">
                    <i class="fas fa-info-circle mr-1"></i> Please register to continue
                </p>
            </div>
            
        </div>

        <form method="POST" action="">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" name="phone"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                    <p class="text-xs text-gray-400 mt-1">Must be at least 6 characters</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" name="confirm_password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-accent focus:border-transparent outline-none transition">
                </div>
                <button type="submit" class="w-full bg-brand-dark text-white py-3 rounded-lg hover:bg-brand-accent transition font-medium">
                    <i class="fas fa-user-plus mr-2"></i> Create Account
                </button>
            </div>
        </form>

        <div class="mt-6 text-center border-t border-gray-200 pt-6">
            <p class="text-sm text-gray-600">
                Already have an account?
                <a href="" class="text-brand-accent hover:underline font-medium">Login</a>
            </p>
        </div>
    </div>
</section>
